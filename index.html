<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:Arial,sans-serif; background:#f0f4ff; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:16px; }
    .card { background:white; border-radius:16px; padding:20px; max-width:380px; width:100%; box-shadow:0 4px 20px rgba(0,0,0,0.1); text-align:center; }
    .logo { font-size:32px; margin-bottom:4px; }
    .coaching { font-size:14px; font-weight:800; color:#0b57d0; margin-bottom:4px; }
    .sub { font-size:11px; color:#888; margin-bottom:16px; }
    #video { width:100%; border-radius:10px; background:#000; display:none; margin-bottom:8px; }
    button { width:100%; padding:12px; font-size:14px; font-weight:700; border:none; border-radius:8px; cursor:pointer; margin-bottom:8px; }
    .btn-start { background:#0b57d0; color:white; }
    .btn-stop  { background:#c62828; color:white; display:none; }
    .result { padding:14px; border-radius:10px; font-size:14px; font-weight:700; margin-top:10px; display:none; white-space:pre-line; text-align:left; }
    .success { background:#e8f5e9; color:#2e7d32; border-left:4px solid #2e7d32; }
    .error   { background:#ffebee; color:#c62828; border-left:4px solid #c62828; }
    .warning { background:#fff8e1; color:#f57f17; border-left:4px solid #f57f17; }
    #status { font-size:12px; color:#666; margin-bottom:8px; min-height:20px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">⚗️</div>
  <div class="coaching">Chemistry with Tanvir Sir</div>
  <div class="sub">Attendance Scanner</div>

  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="status">Scanner ready</div>
  <button class="btn-start" id="startBtn" onclick="startScanner()">📷 Scanner চালু করো</button>
  <button class="btn-stop"  id="stopBtn"  onclick="stopScanner()">⏹️ বন্ধ করো</button>
  <div class="result" id="result"></div>
</div>

<script>
const DEPLOY_URL = "https://script.google.com/macros/s/AKfycbwGG8b4GbrZ5lUy-Hm10bvNzK17mZ1bBPVCoUeH1fECIRDRMCXMAul4aDtHIUGXFOFQ/exec";

let stream=null, scanning=false, processing=false, rafId=null;

// jsQR dynamically load
const script = document.createElement('script');
script.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
script.onload  = () => setStatus("✅ Ready to scan");
script.onerror = () => setStatus("❌ Library load failed");
document.head.appendChild(script);

function setStatus(msg){ document.getElementById("status").textContent = msg; }

function startScanner(){
  const video = document.getElementById("video");
  setStatus("📷 Camera চালু হচ্ছে...");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" }, width: { ideal: 640 }, height: { ideal: 480 } }
  })
  .then(s => {
    stream = s;
    video.srcObject = s;
    video.style.display = "block";
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("stopBtn").style.display  = "block";
    document.getElementById("result").style.display   = "none";

    video.onloadedmetadata = () => {
      video.play();
      setStatus("🔍 Scanning... (" + video.videoWidth + "x" + video.videoHeight + ")");
      scanning = true;
      requestAnimationFrame(tick);
    };
  })
  .catch(err => {
    setStatus("❌ Camera error: " + err.message);
  });
}

function tick(){
  if(!scanning) return;
  const video  = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  if(video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0){
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    if(typeof jsQR !== "undefined" && !processing){
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
  inversionAttempts: "attemptBoth"
});

      if(code && code.data){
        processing = true;
        scanning   = false;
        setStatus("✅ QR found!");
        processQR(code.data);
        return;
      }
    }
  }

  rafId = requestAnimationFrame(tick);
}

function stopScanner(){
  scanning   = false;
  processing = false;
  if(rafId) cancelAnimationFrame(rafId);
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  const video = document.getElementById("video");
  video.srcObject  = null;
  video.style.display = "none";
  document.getElementById("startBtn").style.display = "block";
  document.getElementById("stopBtn").style.display  = "none";
  setStatus("Scanner stopped");
}

function processQR(url){
  setStatus("⏳ Attendance mark করছে...");
  try{
    const urlObj = new URL(url);
    const id     = urlObj.searchParams.get("id");
    const mobile = urlObj.searchParams.get("mobile");

    if(!id || !mobile){
      showResult("error", "❌ Invalid QR Code");
      return;
    }

    const apiUrl = `${DEPLOY_URL}?id=${encodeURIComponent(id)}&mobile=${encodeURIComponent(mobile)}&scanner=true`;

    fetch(apiUrl, { redirect: 'follow' })
      .then(r => r.text())
      .then(html => {
        const s = html.match(/✅[^<\n]*/);
        const w = html.match(/⚠️[^<\n]*/);
        const e = html.match(/❌[^<\n]*/);
        const n = html.match(/class="sname">([^<]+)/);
        const m = html.match(/class="smsg">([^<]+)/);

        const name = n ? "\n" + n[1].trim() : "";
        const msg  = m ? "\n" + m[1].trim() : "";

        if(s)      showResult("success", s[0].trim() + name + msg);
        else if(w) showResult("warning", w[0].trim() + name);
        else if(e) showResult("error",   e[0].trim());
        else       showResult("success", "✅ Done!" + name);
      })
      .catch(err => showResult("error", "❌ Network error\n" + err.message));

  } catch(e){
    showResult("error", "❌ Invalid QR\n" + url.substring(0,50));
  }
}

function showResult(type, msg){
  const el = document.getElementById("result");
  el.className     = "result " + type;
  el.style.display = "block";
  el.textContent   = msg;
  setStatus("⏳ 3s পর আবার scan হবে...");

  setTimeout(() => {
    processing = false;
    scanning   = true;
    setStatus("🔍 Scanning...");
    requestAnimationFrame(tick);
  }, 3000);
}
</script>
</body>
</html>
